<!-- assets/engineering-banner.svg -->
<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080d"/>
      <stop offset="55%" stop-color="#071827"/>
      <stop offset="100%" stop-color="#0b2540"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.13">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200" stroke="#6bb6ff"/>
    <path d="M100 0 V360 M200 0 V360 M300 0 V360 M400 0 V360 M500 0 V360 M600 0 V360 M700 0 V360 M800 0 V360 M900 0 V360 M1000 0 V360 M1100 0 V360" stroke="#6bb6ff"/>
  </g>

  <!-- Animated scanning line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#2f9bff" stroke-width="2" opacity="0.55" filter="url(#glow)">
    <animate attributeName="y1" values="0;360;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;360;0" dur="7s" repeatCount="indefinite"/>
  </line>

  <!-- Technical outline -->
  <g transform="translate(760 70)" opacity="0.85">
    <rect x="0" y="40" width="300" height="160" rx="18" fill="none" stroke="#3fa7ff" stroke-width="2"/>
    <rect x="40" y="80" width="220" height="80" rx="10" fill="none" stroke="#7cc7ff" stroke-width="1.5"/>
    <circle cx="45" cy="45" r="12" fill="none" stroke="#7cc7ff"/>
    <circle cx="255" cy="45" r="12" fill="none" stroke="#7cc7ff"/>
    <circle cx="45" cy="195" r="12" fill="none" stroke="#7cc7ff"/>
    <circle cx="255" cy="195" r="12" fill="none" stroke="#7cc7ff"/>

    <path d="M300 105 H390 M300 135 H390" stroke="#3fa7ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M-90 105 H0 M-90 135 H0" stroke="#3fa7ff" stroke-width="8" stroke-linecap="round"/>

    <animateTransform attributeName="transform" type="translate"
      values="760 70; 760 62; 760 70" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Pulsing nodes -->
  <circle cx="1040" cy="175" r="5" fill="#55b7ff" filter="url(#glow)">
    <animate attributeName="r" values="4;9;4" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Text -->
  <text x="70" y="120" font-family="Inter, Segoe UI, Arial" font-size="56" font-weight="800" fill="#ffffff">
    Joaquin Coaquira
  </text>

  <text x="72" y="165" font-family="Inter, Segoe UI, Arial" font-size="26" font-weight="600" fill="#58a6ff">
    Mechanical / Product Engineer
  </text>

  <text x="72" y="205" font-family="Inter, Segoe UI, Arial" font-size="20" fill="#c7d7e8">
    Thermal Systems · Simulation-Driven Design · Product Development
  </text>

  <text x="72" y="260" font-family="Inter, Segoe UI, Arial" font-size="17" fill="#8fa7bd">
    High-power thermal systems • CFD/FEA • GD&amp;T • DFM/DFA • Manufacturing optimization
  </text>

  <!-- Animated underline -->
  <rect x="72" y="285" width="0" height="4" rx="2" fill="#2f9bff">
    <animate attributeName="width" values="0;520;520;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
